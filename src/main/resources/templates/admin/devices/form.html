<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title th:text="${mode == 'REGISTER'} ? '端末登録' : '端末編集'"></title>
</head>
<body>
<section layout:fragment="content">
    <div>
        <form th:action="${mode == 'REGISTER'} ? @{/admin/devices} : @{/admin/devices/{id}(id=${id})}"
              th:method="${mode == 'REGISTER'} ? post : put"
              th:object="${deviceForm}">
            <div class="form-group mt-3">
                <label for="name" class="form-label">端末名</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" th:errorclass="is-invalid">
                <span th:errors="*{name}" class="invalid-feedback"></span>
            </div>
            <div class="form-group mt-3">
                <label for="modelNumber" class="form-label">モデル番号</label>
                <input type="text" id="modelNumber" th:field="*{modelNumber}" class="form-control" th:errorclass="is-invalid">
                <span th:errors="*{modelNumber}" class="invalid-feedback"></span>
            </div>
            <div class="form-group mt-3">
                <label for="serialNumber" class="form-label">シリアル番号</label>
                <input type="text" id="serialNumber" th:field="*{serialNumber}" class="form-control" th:errorclass="is-invalid">
                <span th:errors="*{serialNumber}" class="invalid-feedback"></span>
            </div>
            <div class="form-group mt-3">
                <label for="introductionDate" class="form-label">導入日</label>
                <input type="text" id="introductionDate" th:field="*{introductionDate}" class="form-control" th:errorclass="is-invalid">
                <span th:errors="*{introductionDate}" class="invalid-feedback"></span>
            </div>
            <div class="form-group mt-3">
                <label for="location" class="form-label">保管場所</label>
                <input type="text" id="location" th:field="*{location}" class="form-control" th:errorclass="is-invalid">
                <span th:errors="*{location}" class="invalid-feedback"></span>
            </div>
            <div class="form-group">
                <label for="status" class="form-label">ステータス</label>
                <select id="status" th:field="*{status}" class="form-control" th:errorclass="is-invalid">
                    <option value="AVAILABLE">在庫有</option>
                    <option value="RENTED">貸出中</option>
                    <option value="BROKEN">故障中</option>
                    <option value="DISPOSED">廃棄</option>
                    <option value="MAINTENANCE">修理中</option>
                </select>
                <span th:errors="*{status}" class="invalid-feedback"></span>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary" th:text="${mode == 'REGISTER'} ? '登録' : '編集'">登録</button>
                <a th:href="${mode == 'REGISTER'} ? @{/devices} : @{/devices/{id}(id=${id})}" class="btn btn-secondary">戻る</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
