<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>端末一覧</title>
</head>
<body>
<section layout:fragment="content">
    <div>
        <a th:href="@{/admin/devices/registerForm}" class="btn btn-primary">端末登録</a>
    </div>
    <div class="card mt-3">
        <div class="card-header">
            検索
        </div>
        <div class="card-body">
            <form th:action="@{/devices}" method="get" th:object="${searchDTO}">
                <div class="form-group">
                    <label class="form-label" for="nameSearch">端末名</label>
                    <input class="form-control" id="nameSearch" th:field="*{name}" placeholder="端末名">
                </div>
                <div class="form-group mt-3">
                    <div>
                        <label class="form-label">ステータス</label>
                    </div>
                    <div class="btn-group">
                        <input class="btn-check" type="checkbox" id="statusSearchAvailable" name="status" value="AVAILABLE" th:checked="*{isChecked('AVAILABLE')}">
                        <label class="btn btn-outline-primary" for="statusSearchAvailable">貸出可</label>
                        <input class="btn-check" type="checkbox" id="statusSearchUsing" name="status" value="USING" th:checked="*{isChecked('USING')}">
                        <label class="btn btn-outline-primary" for="statusSearchUsing">貸出中</label>
                        <input class="btn-check" type="checkbox" id="statusSearchMaintenance" name="status" value="MAINTENANCE" th:checked="*{isChecked('MAINTENANCE')}">
                        <label class="btn btn-outline-primary" for="statusSearchMaintenance">メンテナンス中</label>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
            </form>
        </div>
    </div>
    <div th:if="${message}" class="alert alert-info mt-3" th:text="${message}"></div>
    <div>
        <table class="table mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>端末名</th>
                <th>ステータス</th>
                <th>予約</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="device : ${deviceList}" th:object="${device}">
                <td><a th:href="@{/devices/{id}(id=*{id})}" th:text="*{id}"></a></td>
                <td><a th:href="@{/devices/{id}(id=*{id})}" th:text="*{name}"></a></td>
                <td th:text="*{statusLabel}"></td>
                <td>
                    <div>
                        <form th:action="@{/devices/{id}/reserveForm(id=*{id})}" >
                            <button type="submit"
                                    class="btn btn-sm"
                                    th:disabled="*{statusCode == 'MAINTENANCE'}"
                                    th:classappend="*{statusCode != 'MAINTENANCE' ? 'btn-primary' : 'btn-secondary'}">予約</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
