<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>端末一覧</title>
</head>
<body>
<!--/* コメントはこれを使う */-->
<section layout:fragment="content">
    <div>
        <a th:href="@{/admin/devices/registerForm}" class="btn btn-primary">端末登録</a>
    </div>
    <div class="card mt-3">
        <div class="card-header">
            検索
        </div>
        <div class="card-body">
            <form th:action="@{/devices}" method="get" th:object="${searchDTO}">
                <div class="form-group">
                    <label class="form-label" for="nameSearch">端末名</label>
                    <input class="form-control" id="nameSearch" th:field="*{name}" placeholder="端末名">
                </div>
                <div class="form-group mt-3">
                    <div>
                        <label class="form-label">ステータス</label>
                    </div>
                    <div class="btn-group">
                        <input class="btn-check" type="checkbox" id="statusSearchAvailable" name="status" value="AVAILABLE" th:checked="*{isChecked('AVAILABLE')}">
                        <label class="btn btn-outline-primary" for="statusSearchAvailable">在庫有</label>
                        <input class="btn-check" type="checkbox" id="statusSearchRented" name="status" value="RENTED" th:checked="*{isChecked('RENTED')}">
                        <label class="btn btn-outline-primary" for="statusSearchRented">貸出中</label>
                        <input class="btn-check" type="checkbox" id="statusSearchBroken" name="status" value="BROKEN" th:checked="*{isChecked('BROKEN')}">
                        <label class="btn btn-outline-primary" for="statusSearchBroken">故障中</label>
                        <input class="btn-check" type="checkbox" id="statusSearchDisposed" name="status" value="DISPOSED" th:checked="*{isChecked('DISPOSED')}">
                        <label class="btn btn-outline-primary" for="statusSearchDisposed">廃棄</label>
                        <input class="btn-check" type="checkbox" id="statusSearchMaintenance" name="status" value="MAINTENANCE" th:checked="*{isChecked('MAINTENANCE')}">
                        <label class="btn btn-outline-primary" for="statusSearchMaintenance">メンテナンス中</label>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
            </form>
        </div>
    </div>
    <div th:if="${message}" class="alert alert-info mt-3" th:text="${message}"></div>
    <div>
        <table class="table mt-3">
            <thead>
            <tr>
                <th>ID</th>
                <th>端末名</th>
                <th>ステータス</th>
                <th>各種手続き</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="device : ${deviceList}" th:object="${device}">
                <td><a th:href="@{/devices/{id}(id=*{id})}" th:text="*{id}"></a></td>
                <td><a th:href="@{/devices/{id}(id=*{id})}" th:text="*{name}"></a></td>
                <td th:text="*{statusLabel}"></td>
                <td>
                    <div class="d-flex gap-2">
                        <form th:action="@{/devices/borrow/{id}(id=*{id})}" method="post">
                            <button type="submit"
                                    class="btn btn-sm"
                                    th:disabled="*{statusCode != 'AVAILABLE'}"
                                    th:classappend="*{statusCode == 'AVAILABLE' ? 'btn btn-primary' : 'btn btn-secondary'}">貸りる</button>
                        </form>
                        <form th:action="@{/devices/reserve}" method="post">
                            <button type="submit"
                            class="btn btn-sm"
                            th:disabled="*{statusCode != 'AVAILABLE' and statusCode != 'RESERVED'}"
                                    th:classappend="*{statusCode == 'RENTED' ? 'btn-outline-primary' : 'btn-outline-secondary'}">予約</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
