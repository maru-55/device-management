<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>端末詳細</title>
</head>
<body>
<!--/* コメントはこれを使う */-->
<section layout:fragment="content">
    <div>
        <a th:href="@{/admin/devices/{id}/editForm(id=${id})}" class="btn btn-primary">編集</a>
        <form
                th:action="@{/admin/devices/{id}(id=${id})}"
                th:method="delete"
                style="display: inline;"
                onclick="return confirm('タスクを削除しますか？');"
        >
            <button type="submit" class="btn btn-danger">削除</button>
        </form>
    </div>
    <div th:object="${device}" class="mt-3">
        <p th:text="'#' + *{id} + ' ' + *{name}"></p>
        <p th:text="*{modelNumber}"></p>
        <p th:text="*{serialNumber}"></p>
        <p th:text="*{introductionDate}"></p>
        <p th:text="*{location}"></p>
        <p th:text="*{statusLabel}"></p>
    </div>
</section>
</body>
</html>
