<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      layout:decorate="~{layout/layout}"
>
<head>
    <title>端末詳細</title>
</head>
<body>
<section layout:fragment="content">
    <div th:object="${device}" class="mt-3">
        <div class="h3">
            <div th:text="'#' + *{id} + ' ' + *{name}"></div>
        </div>
        <div class="row mb-2 mt-3">
            <label class="col-sm-2 fw-bold">モデル番号</label>
            <div class="col-sm-10" th:text="*{modelNumber}"></div>
        </div>
        <div class="row mb-2">
            <label class="col-sm-2 fw-bold">シリアル番号</label>
            <div class="col-sm-10" th:text="*{serialNumber}"></div>
        </div>
        <div class="row mb-2">
            <label class="col-sm-2 fw-bold">導入日</label>
            <div class="col-sm-10" th:text="*{introductionDate}"></div>
        </div>
        <div class="row mb-2">
            <label class="col-sm-2 fw-bold">保管場所</label>
            <div class="col-sm-10" th:text="*{location}"></div>
        </div>
        <div class="row mb-2">
            <label class="col-sm-2 fw-bold">ステータス</label>
            <div class="col-sm-10" th:text="*{statusLabel}"></div>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3 mt-5" sec:authorize="hasAuthority('ADMIN')">
        <a th:href="@{/admin/devices/{id}/editForm(id=${id})}" class="btn btn-primary">編集</a>
        <form
                th:action="@{/admin/devices/{id}(id=${id})}"
                th:method="delete"
                style="display: inline;"
                onclick="return confirm('端末を削除しますか？');"
        >
            <button type="submit" class="btn btn-danger me-5">削除</button>
        </form>
        <a th:href="@{/devices}" class="btn btn-secondary ms-5">戻る</a>
    </div>
    <div sec:authorize="hasAuthority('USER')">
        <a th:href="@{/devices}" class="btn btn-secondary">戻る</a>
    </div>
</section>
</body>
</html>
